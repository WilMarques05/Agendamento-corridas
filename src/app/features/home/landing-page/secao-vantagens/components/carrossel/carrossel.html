<div
  id="carouselExampleFade"
  class="carrossel-container carousel slide carousel-fade"
  data-bs-ride="carousel"
>
  <div class="carousel-inner">
    <div class="carousel-item active" data-bs-interval="3000">
      <img src="carrossel_vantagens_img1.png" class="d-block w-100" alt="..." />
    </div>
    <div class="carousel-item" data-bs-interval="3000">
      <img src="carrossel_vantagens_img2.png" class="d-block w-100" alt="..." />
    </div>
    <div class="carousel-item" data-bs-interval="3000">
      <img src="carrossel_vantagens_img3.png" class="d-block w-100" alt="..." />
    </div>
    <div class="carousel-item" data-bs-interval="3000">
      <img src="carrossel_vantagens_img4.png" class="d-block w-100" alt="..." />
    </div>
  </div>
  <button
    class="carousel-control-prev"
    type="button"
    data-bs-target="#carouselExampleFade"
    data-bs-slide="prev"
  >
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button
    class="carousel-control-next"
    type="button"
    data-bs-target="#carouselExampleFade"
    data-bs-slide="next"
  >
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
