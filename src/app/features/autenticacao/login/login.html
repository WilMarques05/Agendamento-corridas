<section class="secao-login">
  <div class="container-imagem">
    <img src="/imagem_login.webp" alt="EliteDrive Login" />
  </div>

  <div class="container-login-direita">
    <div class="card-login">
      <div class="topo-card text-center mb-4">
        <h2 class="titulo-login">Área de Login</h2>
        <p class="subtitulo-login">Acesse sua conta e continue sua jornada.</p>
      </div>

      <div class="abas-login d-flex mb-4">
        <button type="button" class="btn-aba aba-passageiro" [class.ativa]="tipoUsuario === 'passageiro'" (click)="mudarAba('passageiro')">
          <i class="bi bi-person-fill me-2"></i> Passageiro
        </button>
        <button type="button" class="btn-aba aba-motorista" [class.ativa]="tipoUsuario === 'motorista'" (click)="mudarAba('motorista')">
          <i class="bi bi-steeringwheel me-2"></i> Motorista
        </button>
      </div>

      <form (ngSubmit)="efetuarLogin()" [class]="tipoUsuario">
        @if (mensagemErro) {
          <div class="alert alert-danger py-2 text-center mb-3" style="font-size: 0.9rem; background: rgba(220, 53, 69, 0.2); border: 1px solid var(--laranjaVibranteNeon); color: #ff6b6b; border-radius: 8px;">
            {{ mensagemErro }}
          </div>
        }

        <div class="campo-grupo mb-3">
          <div class="input-wrapper">
            <i class="bi bi-envelope icone-input"></i>
            <input type="email" placeholder="E-mail" required [(ngModel)]="credenciais.email" name="email" class="input-custom">
          </div>
        </div>

        <div class="campo-grupo mb-3">
          <div class="input-wrapper">
            <i class="bi bi-lock icone-input"></i>
            <input [type]="exibirSenha ? 'text' : 'password'" placeholder="Senha" required [(ngModel)]="credenciais.senha" name="senha" class="input-custom">
            <button type="button" class="btn-olho" (click)="exibirSenha = !exibirSenha">
              <i class="bi" [class.bi-eye-slash]="exibirSenha" [class.bi-eye]="!exibirSenha"></i>
            </button>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 opções-extras">
          <label class="check-lembrar"><input type="checkbox" name="lembrar"> <span>Lembrar-me</span></label>
          <a routerLink="/recuperar-senha" class="link-esqueci">Esqueci minha senha</a>
        </div>

        <button type="submit" class="btn-entrar-submit" [ngClass]="'btn-' + tipoUsuario" [disabled]="carregando">
          @if (!carregando) {
            <span>Entrar</span>
          } @else {
            <span class="spinner-border spinner-border-sm" role="status"></span>
            <span class="ms-2">Conectando...</span>
          }
        </button>
      </form>
    </div>
  </div>
</section>
